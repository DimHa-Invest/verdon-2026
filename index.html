      const getGpsLink = (placeName, city) => {

          const day = today.getDate();
          if (day >= 8 && day <= 23) return day - 8;
        }
        return null;
      });

        if (activeTab === 'programme' && expandedDay !== null) {

        const saved = localStorage.getItem('verdonChecklistMemory');

      }, [checkedItems]);

      useEffect(() => {
        const handleOnline = () => setIsOffline(false);
        const handleOffline = () => setIsOffline(true);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);

          try {
            const response = await fetch('https://api.openweathermap.org/data/2.5/weather?q=Moustiers-Sainte-Marie&units=metric&appid=bd5e378503939ddaee76f12ad7a97608');

              const data = await response.json();
              setMeteoLive({ temp: Math.round(data.main.temp) });
            }
          } catch {
            const cache = localStorage.getItem('meteoVerdonCache');
            if (cache) setMeteoLive(JSON.parse(cache));
          }

        fetchMeteo();
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);

                              {day.image && <img src={day.image} className="w-full h-40 object-cover rounded-lg shadow-inner" />}
                              <div>
                                <h4 className="text-xs font-black uppercase tracking-wider text-slate-400 mb-1 flex items-center"><List className="w-3.5 h-3.5 mr-1"/> Logistique de terrain :</h4>
                                <ul className="space-y-1 text-xs text-slate-600 font-medium">
                                  {day.details.map((det, idx) => <li key={idx} className="flex items-center gap-1.5"><span className="text-teal-500">•</span>{det}</li>)}
                                </ul>
                              </div>

                              {/* DUAL CHOICE DYNAMIQUE */}
                              {day.food && (
                                <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                  <p className="text-[10px] font-black uppercase text-slate-400 tracking-wider mb-2">⚖️ Restauration : Snack ou Resto (Au Choix)</p>
                                  <div className="grid grid-cols-2 gap-2">
                                    <button 
                                      onClick={(e) => { e.stopPropagation(); window.open(getGpsLink(day.food.snack, day.food.city), '_blank'); }}
                                      className="flex flex-col items-center justify-between p-2.5 bg-white border border-orange-200 rounded-lg hover:bg-orange-50 transition-all text-center group"
                                    >
                                      <Coffee className="w-4 h-4 text-orange-500 mb-1" />
                                      <span className="text-xs font-black text-orange-900 group-hover:text-orange-600">Option Rapide / Snack</span>
                                      <span className="text-[10px] text-slate-500 font-bold mt-1 line-clamp-1 border-t border-slate-100 pt-1 w-full">{day.food.snack}</span>
                                    </button>
                                    <button 
                                      onClick={(e) => { e.stopPropagation(); window.open(getGpsLink(day.food.resto, day.food.restoCity || day.food.city), '_blank'); }}
                                      className="flex flex-col items-center justify-between p-2.5 bg-white border border-teal-200 rounded-lg hover:bg-teal-50 transition-all text-center group"
                                    >
                                      <Heart className="w-4 h-4 text-teal-500 mb-1" />
                                      <span className="text-xs font-black text-teal-900 group-hover:text-teal-600">Option Restaurant</span>
                                      <span className="text-[10px] text-slate-500 font-bold mt-1 line-clamp-1 border-t border-slate-100 pt-1 w-full">{day.food.resto}</span>
                                    </button>
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* COMPOSANT : ADRESSES CLÉS */}
            {activeTab === 'adresses' && (
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {adressesData.map((item, idx) => (
                  <div key={idx} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center gap-4">
                    <div>
                      <h3 className="font-extrabold text-slate-800 text-sm">{item.title}</h3>
                      <p className="text-[11px] font-medium text-slate-400 mt-0.5">{item.desc}</p>
                    </div>
                    <button onClick={() => window.open(getGpsLink(item.address, ""), '_blank')} className="bg-teal-50 p-2.5 rounded-lg text-teal-600 hover:bg-teal-500 hover:text-white transition-all shrink-0">
                      <Navigation size={16} />
                    </button>
                  </div>
                ))}
              </div>
            )}

            {/* COMPOSANT : CHECKLIST EXHAUSTIVE */}
            {activeTab === 'checklist' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {checklistCategories.map((cat) => (
                  <div key={cat.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                    <h3 className="font-black text-slate-800 text-sm mb-3 pb-1 border-b border-slate-100">{cat.title}</h3>
                    <div className="space-y-2">
                      {cat.items.map((item) => {
                        const isChecked = checkedItems[item.id] || false;
                        return (
                          <label key={item.id} className="flex items-start space-x-2.5 p-1 rounded cursor-pointer hover:bg-slate-50">
                            <input type="checkbox" className="hidden" checked={isChecked} onChange={() => toggleCheck(item.id)} />
                            <div className="mt-0.5 shrink-0">{isChecked ? <CheckSquare className="w-4 h-4 text-green-500" /> : <Square className="w-4 h-4 text-slate-300" />}</div>
                            <span className={`text-xs font-bold text-slate-600 ${isChecked ? 'line-through text-slate-400 font-medium' : ''}`}>{item.text}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* COMPOSANT : BUDGET */}
            {activeTab === 'budget' && (
              <div className="space-y-4">
                <div className="bg-slate-900 text-white p-5 rounded-2xl shadow-md">
                  <h3 className="text-slate-400 text-[10px] font-black uppercase tracking-wider mb-0.5">Solde Restant à Charge sur Place</h3>
                  <p className="text-3xl font-black tracking-tight text-teal-400">{resteACharge.toFixed(2)} €</p>
                  <div className="text-xs text-slate-400 mt-3 border-t border-slate-800 pt-3 space-y-1.5 font-medium">
                    <div className="flex justify-between"><span>Budget prévisionnel total</span><span className="text-white font-bold">{totalPrevu.toFixed(2)} €</span></div>
                    <div className="flex justify-between"><span>Financement Chèques ANCV</span><span className="text-green-400 font-bold">-{totalANCV.toFixed(2)} €</span></div>
                    <div className="flex justify-between"><span>Acompte déjà débité</span><span className="text-blue-400 font-bold">-{totalDejaPaye.toFixed(2)} €</span></div>
                  </div>
                </div>
              </div>
            )}

            {/* COMPOSANT : BOITE A MALICES */}
            {activeTab === 'infos' && (
              <div className="space-y-4">
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                  <h3 className="font-black text-slate-800 text-sm mb-3 flex items-center text-indigo-700">
                    <ShoppingBag className="w-4 h-4 mr-1.5"/> Approvisionnements & Supermarchés Centraux
                  </h3>
                  <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 flex justify-between items-center gap-4">
                    <div>
                      <p className="text-xs font-black text-slate-800">Intermarché SUPER — Riez</p>
                      <p className="text-[11px] font-medium text-slate-500 mt-0.5">Le point d'ancrage principal. Idéal pour éviter les micro-frais des épiceries de camping. Horaires stratégiques : 08h30 à l'ouverture.</p>
                    </div>
                    <button onClick={() => window.open(getGpsLink("Intermarché SUPER", "Riez"), '_blank')} className="bg-indigo-50 p-2 rounded-lg text-indigo-600 hover:bg-indigo-500 hover:text-white transition-all shrink-0">
                      <Navigation size={14} />
                    </button>
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {[
                    { title: "Gestion Financière", desc: "Conserve une réserve de liquidités en coupures de 10€/20€ dans le Tucson. Les horodateurs des belvédères sauvages et les artisans des marchés refusent la carte bancaire." },
                    { title: "Bateaux Électriques & Activités", desc: "Aucune exception possible au mois d'août : appelle à l'avance (48h minimum) pour bloquer ton créneau à Esparron ou au Galetas." }
                  ].map((cons, idx) => (
                    <div key={idx} className="bg-amber-50/70 border border-amber-200 p-3 rounded-xl">
                      <h4 className="font-black text-amber-950 text-xs mb-0.5">{cons.title}</h4>
                      <p className="text-amber-900 text-[11px] font-medium leading-relaxed">{cons.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
