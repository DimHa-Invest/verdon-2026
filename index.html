        { id: 'cat-retour', title: "🔙 Avant le retour", items: [{ id: "c28", text: "Vider et nettoyer le frigo du mobil-home" }, { id: "c29", text: "Rassembler toutes les affaires (vérifier sous les lits)" }, { id: "c30", text: "Faire l'état des lieux du camping" }, { id: "c31", text: "Acheter les souvenirs / spécialités (Marché de Riez le 22.08)" }, { id: "c32", text: "Préparer un pique-nique pour la route du retour" }] }
      ];

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
          {/* HEADER */}
          <header className="bg-gradient-to-r from-teal-500 to-emerald-400 text-white p-6 shadow-lg rounded-b-3xl relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent"></div>
            <div className="max-w-4xl mx-auto relative z-10 flex flex-col md:flex-row items-center justify-between">
              <div className="text-center md:text-left mb-4 md:mb-0">
                <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight mb-2 drop-shadow-md">
                  Verdon 2026 🛶
                </h1>
                <p className="text-teal-50 text-lg font-medium">L'Aventure Familiale de Dimitri & Co !</p>
                {isOffline && (
                  <span className="inline-block mt-2 px-3 py-1 bg-red-500/90 text-white text-xs rounded-lg font-bold tracking-wider animate-pulse shadow-sm">
                    🚫 MODE HORS-LIGNE
                  </span>
                )}
              </div>
              <div className="flex flex-col sm:flex-row gap-3">
                <div className="bg-white/20 backdrop-blur-sm rounded-xl p-3 flex items-center space-x-3 border border-white/30 shadow-sm">
                  <Calendar className="w-6 h-6 text-yellow-300" />
                  <span className="font-bold text-lg">9 - 23 Août 2026</span>
                </div>
                {meteoLive && (
                  <div className="bg-white/20 backdrop-blur-sm rounded-xl p-3 flex items-center justify-between gap-3 border border-white/30 shadow-sm">
                    <span className="text-sm font-semibold tracking-wide">Moustiers</span>
                    <div className="flex items-center space-x-2">
                      <Cloud className="w-5 h-5 text-blue-200" />
                      <span className="font-black text-lg">{meteoLive.temp}°C</span>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </header>

          {/* NAVIGATION */}
          <nav className="max-w-4xl mx-auto mt-8 px-4">
            <div className="flex flex-wrap justify-center gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
              {[
                { id: 'programme', label: 'Le Programme', icon: Map },
                { id: 'hebergement', label: 'Le Camp de Base', icon: Tent },
                { id: 'adresses', label: 'Lieux & Adresses', icon: Navigation },
                { id: 'restauration', label: 'Où Manger ?', icon: Utensils },
                { id: 'checklist', label: 'Checklist', icon: ClipboardCheck },
                { id: 'budget', label: 'Le Trésor', icon: Wallet },
                { id: 'infos', label: 'Boîte à Malices', icon: Info },
              ].map((tab) => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex items-center space-x-2 px-3 py-2.5 rounded-xl font-semibold transition-all duration-300 ${
                    activeTab === tab.id
                      ? 'bg-teal-500 text-white shadow-md transform scale-105'
                      : 'bg-slate-50 text-slate-600 hover:bg-teal-50 hover:text-teal-600'
                  }`}
                >
                  <tab.icon className="w-4 h-4" />
                  <span className="text-sm">{tab.label}</span>
                </button>
              ))}
            </div>
          </nav>

          <main className="max-w-4xl mx-auto mt-8 px-4 pb-16">
            
            {/* COMPOSANT 1 : PROGRAMME DE J1 A J15 */}
            {activeTab === 'programme' && (
              <div className="animate-fade-in">
                <h2 className="text-2xl font-bold mb-6 text-teal-800 flex items-center">
                  <Map className="w-6 h-6 mr-2 text-teal-500" /> Carnet de Bord Jour par Jour
                </h2>
                <div className="relative border-l-4 border-teal-200 ml-4 md:ml-6 space-y-8">
                  {programme.map((day, index) => {
                    const Icon = day.icon;
                    const isExpanded = expandedDay === index;
                    return (
                      <div key={index} id={"jour-" + index} className="relative pl-8 md:pl-10 group">
                        <div className={`absolute -left-[14px] md:-left-[18px] top-1 w-6 h-6 md:w-8 md:h-8 rounded-full border-4 border-slate-50 flex items-center justify-center shadow-sm transition-transform duration-300 ${day.color}`}>
                          <Icon className="w-3 h-3 md:w-4 md:h-4 text-white" />
                        </div>
                        <div 
                          className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 transition-all duration-300 hover:shadow-md hover:border-teal-200 transform cursor-pointer"
                          onClick={() => setExpandedDay(isExpanded ? null : index)}
                        >
                          {day.image && (
                            <div className="mb-4 overflow-hidden rounded-xl h-48 w-full bg-slate-100">
                              <img src={day.image} alt={day.title} className={`w-full h-full object-cover ${day.imagePosition || 'object-center'}`} />
                            </div>
                          )}
                          <div className="flex justify-between items-start mb-2">
                            <span className="px-3 py-1 bg-slate-100 text-slate-700 font-bold rounded-lg text-sm">{day.date}</span>
                            <span className="px-2 py-0.5 rounded-lg text-xs font-bold uppercase bg-orange-100 text-orange-700">{day.type}</span>
                          </div>
                          <h3 className="text-xl font-bold text-slate-800 mb-2">{day.title}</h3>
                          <p className="text-slate-600 leading-relaxed text-sm">{day.desc}</p>
                          {isExpanded && day.details && (
                            <div className="mt-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                              <h4 className="font-bold text-slate-800 mb-2 text-xs uppercase tracking-wider flex items-center"><List className="w-4 h-4 mr-1 text-teal-600"/> Détails logistiques :</h4>
                              <ul className="space-y-1">
                                {day.details.map((detail, dIdx) => (
                                  <li key={dIdx} className="text-sm text-slate-600 flex items-start"><span className="text-teal-500 mr-2">•</span>{detail}</li>
                                ))}
                              </ul>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* COMPOSANT 2 : CAMP DE BASE */}
            {activeTab === 'hebergement' && (
              <div className="animate-fade-in space-y-6">
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                  <h2 className="text-3xl font-bold text-teal-800 mb-2">Camping La Farigoulette <span className="text-yellow-400">⭐⭐⭐⭐⭐</span></h2>
                  <p className="text-slate-500 flex items-center mb-4"><MapPin className="w-5 h-5 mr-1"/> Saint-Laurent-du-Verdon</p>
                  <img src="https://luxe-res.cloudinary.com/t_1400/f_auto/v1670256422/campings/1616511/camping-la-farigoulette-saint-laurent-du-verdon-5E-FB-CF-24-88-4B-0A-63-37-CE-56-00-CB-9E-0B-2A-26-B1-63-31.jpg" className="w-full h-64 object-cover rounded-2xl mb-4 shadow-sm"/>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                    <div className="bg-blue-50 p-4 rounded-2xl text-center"><Waves className="w-8 h-8 text-blue-500 mx-auto mb-2"/> <h4 className="font-bold text-blue-900">Piscine Chauffée</h4></div>
                    <div className="bg-teal-50 p-4 rounded-2xl text-center"><Anchor className="w-8 h-8 text-teal-500 mx-auto mb-2"/> <h4 className="font-bold text-teal-900">Base Nautique</h4></div>
                    <div className="bg-orange-50 p-4 rounded-2xl text-center"><Sun className="w-8 h-8 text-orange-500 mx-auto mb-2"/> <h4 className="font-bold text-orange-900">Club Enfants (5-7 ans)</h4></div>
                  </div>
                </div>
              </div>
            )}

            {/* COMPOSANT 3 : LIEUX & ADRESSES */}
            {activeTab === 'adresses' && (
              <div className="animate-fade-in space-y-6">
                <h2 className="text-2xl font-bold text-teal-800 flex items-center"><Navigation className="w-6 h-6 mr-2 text-teal-500"/> Adresses Utiles & Lanceurs GPS</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {adressesData.map((item, idx) => (
                    <div key={idx} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center group">
                      <div className="flex items-start space-x-4">
                        <div className={`w-11 h-11 rounded-xl flex items-center justify-center ${item.bg}`}><item.icon className={`w-5 h-5 ${item.color}`} /></div>
                        <div>
                          <h3 className="font-bold text-slate-800">{item.title}</h3>
                          <p className="text-xs text-slate-500 mb-2">{item.desc}</p>
                          <span className="text-xs font-mono bg-slate-50 p-1.5 rounded border border-slate-100 block select-all">{item.address}</span>
                        </div>
                      </div>
                      <a href={`geo:0,0?q=${encodeURIComponent(item.address)}`} className="bg-teal-50 p-3 rounded-xl text-teal-600 hover:bg-teal-500 hover:text-white transition-colors" title="Lancer l'itinéraire GPS">
                        <Navigation size={18} />
                      </a>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* COMPOSANT 4 : OÙ MANGER */}
            {activeTab === 'restauration' && (
              <div className="animate-fade-in space-y-6">
                <h2 className="text-2xl font-bold text-teal-800 flex items-center"><Utensils className="w-6 h-6 mr-2 text-teal-500"/> Points de Ravitaillement</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {restaurantsData.map((resto, idx) => (
                    <div key={idx} className={`bg-white p-5 rounded-2xl shadow-sm border ${resto.border}`}>
                      <div className="flex items-center space-x-3 mb-2">
                        <div className={`w-9 h-9 rounded-full flex items-center justify-center ${resto.bg}`}><resto.icon className={`w-4 h-4 ${resto.color}`} /></div>
                        <div>
                          <span className="text-[10px] font-bold uppercase text-slate-400">{resto.area}</span>
                          <h3 className="text-base font-bold text-slate-800 leading-none">{resto.title}</h3>
                        </div>
                      </div>
                      <p className="text-slate-600 text-sm leading-relaxed">{resto.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* COMPOSANT 5 : BUDGET */}
            {activeTab === 'budget' && (
              <div className="animate-fade-in space-y-6">
                <h2 className="text-2xl font-bold text-teal-800 flex items-center"><Wallet className="w-6 h-6 mr-2 text-teal-500"/> Trésorerie & Solde</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-slate-900 text-white p-6 rounded-3xl shadow-lg relative">
                    <h3 className="text-slate-400 text-sm mb-1">Budget Prévu</h3>
                    <p className="text-4xl font-black mb-4">{fmtPrix(totalPrevu)} €</p>
                    <div className="space-y-2 text-sm border-t border-slate-800 pt-3">
                      <div className="flex justify-between"><span className="text-slate-400">Chèques ANCV</span><span className="text-green-400">-{fmtPrix(totalANCV)} €</span></div>
                      <div className="flex justify-between"><span className="text-slate-400">Acompte payé</span><span className="text-blue-400">-{fmtPrix(totalDejaPaye)} €</span></div>
                      <div className="flex justify-between border-t border-slate-800 pt-2 font-bold text-base"><span className="text-slate-300">Reste à charge</span><span className="text-teal-300">{fmtPrix(resteACharge)} €</span></div>
                    </div>
                  </div>
                  <div className="space-y-3">
                    {budgetData.map((item, idx) => (
                      <div key={idx} className="bg-white p-3.5 rounded-xl border border-slate-100 flex items-center justify-between">
                        <div className="flex items-center space-x-3">
                          <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${item.bg}`}><item.icon className={`w-5 h-5 ${item.color}`} /></div>
                          <div>
                            <h4 className="font-bold text-sm text-slate-800">{item.label}</h4>
                            <span className="text-xs text-slate-400">Prévu : {fmtPrix(item.prevu)}€</span>
                          </div>
                        </div>
                        <div className="text-right"><span className="text-xs text-slate-400 block">Dû</span><span className="font-bold text-sm text-slate-800">{fmtPrix(item.prevu - item.ancv - item.dejaPaye)}€</span></div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* COMPOSANT 6 : BOITE A MALICES */}
            {activeTab === 'infos' && (
              <div className="animate-fade-in space-y-6">
                <h2 className="text-2xl font-bold text-teal-800 flex items-center"><Info className="w-6 h-6 mr-2 text-teal-500"/> Boîte à Malices</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div className="bg-amber-50 border border-amber-200 p-5 rounded-2xl">
                    <h4 className="font-bold text-amber-900 mb-1">Anticipation !</h4>
                    <p className="text-amber-800 text-sm">Bateaux électriques et rando aqua à réserver au moins 48h à l'avance en août.</p>
                  </div>
                  <div className="bg-emerald-50 border border-emerald-200 p-5 rounded-2xl">
                    <h4 className="font-bold text-emerald-900 mb-1">Liquidités / Espèces</h4>
                    <p className="text-emerald-800 text-sm">Pense à retirer des espèces avant les sorties pour payer les petits parkings de randonnée et les marchés locaux.</p>
                  </div>
                </div>
              </div>
            )}

            {/* COMPOSANT 7 : CHECKLIST */}
            {activeTab === 'checklist' && (
              <div className="animate-fade-in space-y-6">
                <h2 className="text-2xl font-bold text-teal-800 flex items-center"><ClipboardCheck className="w-6 h-6 mr-2 text-teal-500"/> Checklist de Préparation</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {checklistCategories.map((category) => {
                    const checkedCount = category.items.filter(item => checkedItems[item.id]).length;
                    const progress = Math.round((checkedCount / category.items.length) * 100);
                    return (
                      <div key={category.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                        <div className="flex justify-between items-center mb-2">
                          <h3 className="font-bold text-slate-800 text-base">{category.title}</h3>
                          <span className="text-xs font-bold bg-slate-100 px-2 py-1 rounded">{checkedCount}/{category.items.length}</span>
                        </div>
                        <div className="w-full bg-slate-100 rounded-full h-1.5 mb-4 overflow-hidden">
                          <div className="bg-teal-500 h-1.5 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="space-y-2">
                          {category.items.map((item) => {
                            const isChecked = checkedItems[item.id] || false;
                            return (
                              <label key={item.id} className="flex items-start space-x-3 p-1.5 rounded cursor-pointer hover:bg-slate-50">
                                <input type="checkbox" className="hidden" checked={isChecked} onChange={() => toggleCheck(item.id)} />
                                <div className="mt-0.5">{isChecked ? <CheckSquare className="w-4 h-4 text-green-500" /> : <Square className="w-4 h-4 text-slate-300" />}</div>
                                <span className={`text-sm text-slate-700 ${isChecked ? 'line-through text-slate-400' : ''}`}>{item.text}</span>
                              </label>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style dangerouslySetInnerHTML={{__html: `
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
  `}} />
</body>
</html>
